AWSTemplateFormatVersion: '2010-09-09'
Description: HighTechMed Infrastructure

# Improvements over instructor's original:
#   - AMI resolved via SSM Parameter Store (no hardcoded AMI ID)
#   - VpcId parameter so the security group is placed in the correct VPC
#   - Name tags added for easy identification in the console
#   - KeyName parameter (instead of hardcoded "Bastion")

Parameters:

  KeyName:
    Type: String
    Default: Bastion
    Description: Name of an existing EC2 key pair to enable SSH access

  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-0535c1f88ffcd21b4
    Description: VPC to deploy resources into (default VPC)

  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: Amazon Linux 2023 AMI (auto-resolved from SSM)

Resources:

  BastionSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: BastionSecurityGroup

  BastionHost:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      KeyName: !Ref KeyName
      ImageId: !Ref AmiId
      SecurityGroupIds:
        - !Ref BastionSecurityGroup
      Tags:
        - Key: Name
          Value: BastionHost
