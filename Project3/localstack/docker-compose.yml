# LocalStack Docker Compose — HighTech Medical Project 3
# Run: docker compose up -d
# Stop: docker compose down
#
# Services simulated locally:
#   lambda, s3, ecs, cloudformation, iam, ec2

services:
  localstack:
    image: localstack/localstack:latest
    container_name: localstack-hightechmed
    ports:
      - "4566:4566"        # Main LocalStack gateway (all services)
      - "4510-4559:4510-4559"  # Extra ports for some services
    environment:
      - SERVICES=lambda,s3,ecs,cloudformation,iam,ec2
      - DEBUG=1
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "./.localstack:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
